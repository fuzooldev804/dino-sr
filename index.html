<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Speed Roast - Dino Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --gb-dark: #0f380f;
            --gb-light: #9bbc0f;
            --gb-mid: #7a9a0c;
            --case-color: #a0a0a8;
            --case-shadow: #5a5a62;
            --case-highlight: #c8c8d0;
            --accent-red: #cc0000;
        }

        * { box-sizing: border-box; }

        body {
            background-color: #0d0d0d;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(30,40,20,0.5) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(10,20,10,0.4) 0%, transparent 60%);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px 30px;
            overflow: hidden;
        }

        #console-case {
            background: var(--case-color);
            background-image:
                linear-gradient(145deg, var(--case-highlight) 0%, var(--case-color) 40%, var(--case-shadow) 100%);
            padding: 25px 20px 45px 20px;
            border-radius: 15px 15px 60px 15px;
            border: 8px solid #1a1a1a;
            box-shadow: 12px 12px 0px #000;
            width: 95%;
            max-width: 380px; /* Slightly increased from 360px */
            position: relative;
        }

        #screen-frame {
            background: linear-gradient(160deg, #2a2a2a, #1a1a1a);
            padding: 12px;
            border-radius: 8px;
            border: 4px solid #000;
            margin-bottom: 15px;
        }

        #game-screen {
            background: var(--gb-light);
            background-image: linear-gradient(180deg, #a8c810 0%, var(--gb-light) 30%, #8dae0a 100%);
            width: 100%;
            height: 400px; /* Slightly increased from 380px */
            border: 4px solid var(--gb-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: var(--gb-dark);
            padding: 0;
        }

        #share-text-banner {
            background: var(--gb-dark);
            color: var(--gb-light);
            padding: 8px 4px;
            font-size: 9px;
            width: 100%;
            line-height: 1.2;
            text-align: center;
            border-bottom: 3px double var(--gb-light);
            visibility: hidden;
            z-index: 10;
            letter-spacing: 0.5px;
        }

        #x-share-link {
            display: none;
            background: var(--gb-dark);
            color: var(--gb-light);
            text-decoration: none;
            font-size: 9px;
            padding: 12px 4px; /* Slightly larger padding */
            width: 100%;
            text-align: center;
            z-index: 11;
            font-weight: bold;
            border-bottom: 3px double var(--gb-light);
            letter-spacing: 0.5px;
            position: absolute;
            top: 28px;
        }

        canvas {
            image-rendering: pixelated;
            width: 100%;
            height: 100px;
            position: absolute;
            top: 50px; /* Slightly adjusted for larger screen */
            z-index: 2;
        }

        .ui-overlay {
            text-align: center;
            display: flex;
            flex-direction: column;
            width: 100%;
            position: absolute;
            top: 165px; /* Adjusted to follow the dino */
            z-index: 2;
        }

        .speed-val {
            font-size: 32px; /* Slightly larger speed font */
            margin: 2px 0;
            letter-spacing: -1px;
            text-shadow: 2px 2px 0px rgba(15,56,15,0.4);
        }

        .unit {
            font-size: 11px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        #status-text { font-size: 10px; margin-bottom: 5px; }

        .roast-display {
            font-size: 12px; /* Slightly larger font for roasts */
            line-height: 1.5;
            padding: 0 15px;
            text-align: center;
            width: 100%;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            position: absolute;
            bottom: 10px;
            z-index: 2;
            color: var(--gb-dark);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .d-pad {
            width: 75px;
            height: 75px;
            background: #222;
            clip-path: polygon(33% 0%, 66% 0%, 66% 33%, 100% 33%, 100% 66%, 66% 66%, 66% 100%, 33% 100%, 33% 66%, 0% 66%, 0% 33%, 33% 33%);
        }

        #go-button {
            background: radial-gradient(circle at 38% 38%, #ee2222, var(--accent-red), #880000);
            width: 75px; height: 75px; /* Slightly larger button */
            border-radius: 50%;
            border: 5px solid #000;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            color: white;
            font-size: 11px;
            outline: none;
        }

        #go-button:active:not(:disabled) { transform: translate(2px, 2px); }

        #status-light {
            width: 10px; height: 10px;
            background: #330000;
            border-radius: 50%;
            position: absolute;
            left: 8px; top: 35%;
            border: 1px solid #111;
        }

        #status-light.on {
            background: #ff2222;
            box-shadow: 0 0 6px #ff0000;
            animation: led-pulse 0.8s infinite;
        }

        @keyframes led-pulse { 50% { opacity: 0.5; } }

        .mini-btns {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 12px;
        }
        .mini-btn { width: 35px; height: 12px; background: #555; border-radius: 6px; border: 2px solid #333; }
        
        .footer-info {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 25px;
        }

        .branding { font-size: 9px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="console-case">
        <div id="status-light"></div>
        <div id="screen-frame">
            <div id="game-screen">
                <div id="share-text-banner">SCREENSHOT OR IT'S FAKE!</div>
                <a href="#" id="x-share-link" target="_blank">SHARE ON X</a>
                
                <canvas id="gameCanvas"></canvas>
                
                <div class="ui-overlay" id="ui">
                    <div id="status-text">READY?</div>
                    <div class="speed-val" id="speed">0.00</div>
                    <div class="unit">Mbps</div>
                </div>
                <div class="roast-display" id="roast"></div>
            </div>
        </div>
        
        <div class="controls">
            <div class="d-pad"></div>
            <div class="mini-btns">
                <div class="mini-btn"></div>
                <div class="mini-btn"></div>
            </div>
            <button id="go-button" onclick="startTest()">GO!</button>
        </div>
    </div>

    <div class="footer-info">
        <div class="branding">DINO SPEED ROASTER</div>
    </div>

    <script>
        const ROAST_COLLECTION = [
            { 
                limit: 20, 
                en: "Did you connect your router to a potato?", 
                ur: "Bhai, isse acha tou kabootar bhej do, wo jaldi pohnch jaye ga." 
            },
            { 
                limit: 40, 
                en: "This is basically a human rights violation.", 
                ur: "Lagta hai internet ki taar pe kisi ne kapre sukhane daale huwe hain." 
            },
            { 
                limit: 60, 
                en: "Average speed for an average life. Boring.", 
                ur: "Bas theek hi hai, na khushi ho rahi hai na rona aa raha hai." 
            },
            { 
                limit: 80, 
                en: "Fast enough to download your regret in HD.", 
                ur: "Chalo shukar hai! Ab poora ghar aik saath YouTube dekh sakay ga." 
            },
            { 
                limit: 250, 
                en: "Okay, NASA. We get it. You're rich.", 
                ur: "Itni speed! Kya poora internet aaj hi download karna hai?" 
            },
            { 
                limit: Infinity, 
                en: "Illegal speeds detected. Calling the FBI from Mars.", 
                ur: "Bhai, ye internet hai ya NASA ka rocket? Maza aa gaya!" 
            }
        ];

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedEl = document.getElementById('speed');
        const statusEl = document.getElementById('status-text');
        const roastEl = document.getElementById('roast');
        const shareBanner = document.getElementById('share-text-banner');
        const xShareLink = document.getElementById('x-share-link');
        const light = document.getElementById('status-light');
        const goBtn = document.getElementById('go-button');

        canvas.width = 300;
        canvas.height = 100;

        let isTesting = false;
        let currentMbps = 0;
        let charX = 20;
        let frame = 0;
        let testAbortController = null;
        let totalDownloadedBytes = 0;

        function drawDino(x, state) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f380f";
            ctx.fillRect(0, 95, canvas.width, 1);

            let bob = 0;
            let legFrame = 0;
            if (state === 'run' || state === 'fast') {
                bob = Math.abs(Math.sin(frame * 0.2)) * 3;
                legFrame = Math.floor(frame / 5) % 2;
            }
            
            const y = 55 - bob;

            ctx.fillRect(x, y + 15, 4, 8);
            ctx.fillRect(x + 4, y + 18, 4, 8);
            ctx.fillRect(x + 8, y + 12, 14, 15);
            ctx.fillRect(x + 18, y, 14, 10);
            ctx.fillRect(x + 18, y + 10, 8, 4);
            ctx.fillStyle = "var(--gb-light)"; 
            ctx.fillRect(x + 22, y + 2, 2, 2);
            ctx.fillStyle = "#0f380f";
            ctx.fillRect(x + 24, y + 14, 4, 2);

            if (legFrame === 0) {
                ctx.fillRect(x + 10, y + 27, 4, 8);
                ctx.fillRect(x + 16, y + 27, 4, 4);
            } else {
                ctx.fillRect(x + 10, y + 27, 4, 4);
                ctx.fillRect(x + 16, y + 27, 4, 8);
            }
        }

        function animate() {
            frame++;
            let state = 'still';
            if (isTesting) {
                state = currentMbps > 60 ? 'fast' : 'run';
                charX += (Math.min(parseFloat(currentMbps), 100) / 30) + 1.5;
                if (charX > canvas.width) charX = -35;
            }
            drawDino(charX, state);
            requestAnimationFrame(animate);
        }

        async function startTest() {
            if (isTesting) return;
            isTesting = true;
            
            light.classList.add('on');
            roastEl.style.visibility = 'hidden';
            shareBanner.style.visibility = 'hidden';
            xShareLink.style.display = 'none';
            statusEl.innerText = "Testing...";
            currentMbps = 0;
            speedEl.innerText = "0.00";
            totalDownloadedBytes = 0;
            goBtn.disabled = true;
            goBtn.style.opacity = "0.5";

            const MAX_DURATION = 8000;
            const MIN_STABILITY_TIME = 3250;
            const startTime = Date.now();
            
            let speedHistory = [];
            testAbortController = new AbortController();

            const runSampler = async () => {
                const chunkUrl = "https://speed.cloudflare.com/__down?bytes=2097152"; 
                try {
                    while (Date.now() - startTime < MAX_DURATION) {
                        const response = await fetch(`${chunkUrl}&cb=${Date.now()}`, { 
                            signal: testAbortController.signal 
                        });
                        const reader = response.body.getReader();
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            totalDownloadedBytes += value.length;
                            const elapsed = (Date.now() - startTime) / 1000;
                            if (elapsed > 0) {
                                currentMbps = ((totalDownloadedBytes * 8) / elapsed / 1000000).toFixed(2);
                                speedEl.innerText = currentMbps;
                                if (Date.now() - startTime > MIN_STABILITY_TIME) {
                                    speedHistory.push(parseFloat(currentMbps));
                                    if (speedHistory.length > 15) speedHistory.shift();
                                    if (speedHistory.length >= 10) {
                                        const recent = speedHistory.slice(-8);
                                        const max = Math.max(...recent);
                                        const min = Math.min(...recent);
                                        const variance = (max - min) / (max || 1);
                                        if (variance < 0.04) {
                                            testAbortController.abort();
                                            return;
                                        }
                                    }
                                }
                            }
                            if (Date.now() - startTime >= MAX_DURATION) {
                                testAbortController.abort();
                                break;
                            }
                        }
                    }
                } catch (e) {}
            };

            await runSampler();
            concludeTest(currentMbps);
        }

        function concludeTest(finalSpeed) {
            isTesting = false;
            light.classList.remove('on');
            statusEl.innerText = "Your Downloading Speed:";
            speedEl.innerText = finalSpeed;
            goBtn.disabled = false;
            goBtn.style.opacity = "1";
            
            const speedVal = parseFloat(finalSpeed);
            const roast = ROAST_COLLECTION.find(r => speedVal < r.limit) || ROAST_COLLECTION[ROAST_COLLECTION.length - 1];
            
            roastEl.innerHTML = `
                <div style="font-weight:bold; margin-bottom:10px;">${roast.en}</div>
                <div>${roast.ur}</div>
            `;
            roastEl.style.visibility = 'visible';
            shareBanner.style.visibility = 'visible';

            const tweetText = `My internet is so slow even the Dino is roasting me! 🦖💨\n\nSpeed: ${finalSpeed} Mbps\n\n"${roast.en}"\n\n"${roast.ur}"\n\nTest yours here: https://fuzooldev804.github.io/dino-sr/ `;
            xShareLink.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}`;
            xShareLink.style.display = 'block';
        }

        window.onload = animate;
    </script>
</body>
</html>
